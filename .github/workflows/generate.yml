name: Generate Wallpaper

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC = 03:00 Argentina
  workflow_dispatch:        # permite ejecutar manualmente desde GitHub

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get install -y libcairo2 fonts-liberation

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate wallpaper
        run: python generate_wallpaper.py

      - name: Commit and push wallpaper
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wallpaper.png
          git diff --cached --quiet || git commit -m "wallpaper: $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
